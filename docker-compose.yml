services:
  db:
    image: postgres:15-alpine
    container_name: autobus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autobusadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autobus098}
      POSTGRES_DB: ${POSTGRES_DB:-autobus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobus_network
  
  redis:
    image: redis:7-alpine
    container_name: autobus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-autobus098} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autobus_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autobus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@useautobus.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-autobus098}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autobus_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autobus_backend
    restart: unless-stopped
    working_dir: /app
    command: bash startup.sh
    volumes:
      - .:/app
    environment:
      # PostgreSQL Environment Variables (for config.py)
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-autobusadmin}
      PGPASSWORD: ${PGPASSWORD:-autobus098}
      PGDATABASE: ${PGDATABASE:-autobus}
      
      # SQLAlchemy Database URL (legacy support)
      SQLALCHEMY_DATABASE_URL: "postgresql://autobusadmin:autobus098@db:5432/autobus"
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-autobus098}
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-green-secret-keeps-gamma}
      ALGORITHM: ${ALGORITHM:-HS256}
      KID: ${KID:-autobus-kid}
      
      # Application Configuration
      DEBUG: ${DEBUG:-false}
      DB_ECHO: ${DB_ECHO:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Message Queue Configuration (if needed)
      RABBIT_MQ_URL: ${RABBIT_MQ_URL:-}
      RABBIT_MQ_ROUTING_KEY: ${RABBIT_MQ_ROUTING_KEY:-}
      RABBIT_MQ_AUDIT_QUEUE: ${RABBIT_MQ_AUDIT_QUEUE:-}
      SMS_MQ_QUEUE: ${SMS_MQ_QUEUE:-}
      EMAIL_MQ_QUEUE: ${EMAIL_MQ_QUEUE:-}
      BATCH_CUSTOMER_UPLOAD_QUEUE: ${BATCH_CUSTOMER_UPLOAD_QUEUE:-}
      COMPANY_QUEUE: ${COMPANY_QUEUE:-}

      # Wirepick SMS Configuration
      WIREPICK_API_URL: "https://api.wirepick.com/httpsms"
      WIREPICK_PUBLIC_KEY: ${WIREPICK_PUBLIC_KEY:-8YyJoInAPwhngnjbD_5u5y2kC0CCvPnMk_F0cKLE3vc}
      WIREPICK_SENDER_ID: ${WIREPICK_SENDER_ID:-AutoBus}
      USE_WIREPICK_API_KEY: ${USE_WIREPICK_API_KEY:-true}
      
      # Frontend and Other URLs
      BASE_FRONTEND_URL: ${BASE_FRONTEND_URL:-https://useautobus.com}
      
      # OTP Configuration
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-5}
      
      # MongoDB Configuration
      MONGO_URI: ${MONGO_URI:-mongodb://localhost:27017/}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-api_logs_db}
      
      # Auto Migration Flag
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}

      # Language Model Configuration
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      AUDIO_TRANSCRIPTION_MODEL: ${AUDIO_TRANSCRIPTION_MODEL:-whisper-large-v3}

      # Google image (Nana Banana) + video (Veo) generation
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      NANA_BANANA_BASE_URL: ${NANA_BANANA_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      NANA_BANANA_MODEL: ${NANA_BANANA_MODEL:-}
      NANA_BANANA_USE_X_GOOG_API_KEY: ${NANA_BANANA_USE_X_GOOG_API_KEY:-false}
      VEO_GENERATE_URL: ${VEO_GENERATE_URL:-https://generativelanguage.googleapis.com/v1beta}
      VEO_MODEL: ${VEO_MODEL:-}
      VEO_USE_X_GOOG_API_KEY: ${VEO_USE_X_GOOG_API_KEY:-false}
      VEO_POLL_INTERVAL_SECONDS: ${VEO_POLL_INTERVAL_SECONDS:-10}
      VEO_MAX_POLL_SECONDS: ${VEO_MAX_POLL_SECONDS:-600}

      BLOTATO_API_KEY: ${BLOTATO_API_KEY:-your_blotato_api_key_here}
      BLOTATO_CLIENT_ID: ${BLOTATO_CLIENT_ID:-your_blotato_client_id_here}
      BLOTATO_CLIENT_SECRET: ${BLOTATO_CLIENT_SECRET:-your_blotato_client_secret_here}
      BLOTATO_REDIRECT_URI: ${BLOTATO_REDIRECT_URI:-https://api.useautobus.com/api/social/callback}

      CONTABO_ACCESS_KEY: ${CONTABO_ACCESS_KEY:-e59e33a21a72b214bfc6aeb3e2fcd711}
      CONTABO_SECRET_KEY: ${CONTABO_SECRET_KEY:-939a59165a7490c08e78311d26182118}
      CONTABO_BUCKET: ${CONTABO_BUCKET:-autobus}
      CONTABO_ENDPOINT: ${CONTABO_ENDPOINT:-https://usc1.contabostorage.com}

      # Postiz (self-hosted) integration
      # If Autobus shares a Docker network with Postiz, prefer service DNS:
      #   POSTIZ_BASE_URL=http://postiz:5000
      # If NOT sharing a Docker network, use host-mapped port (Docker Desktop):
      #   POSTIZ_BASE_URL=http://host.docker.internal:4007
      POSTIZ_BASE_URL: ${POSTIZ_BASE_URL:-http://postiz:5000}
      # Browser-facing Postiz URL used in authorization links.
      POSTIZ_PUBLIC_URL: ${POSTIZ_PUBLIC_URL:-https://postiz.useautobus.com}
      # Postiz/Chatwoot LOCAL login: email + Autobus username (fullname), not the Autobus password.
      # When true, enables POST /api/v1/integrations/provision-self-test (destructive upstream).
      INTEGRATIONS_SELF_TEST_ENABLED: ${INTEGRATIONS_SELF_TEST_ENABLED:-false}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}

      # Chatwoot (self-hosted) integration (optional)
      # If shared network: CHATWOOT_BASE_URL=http://chatwoot_rails:3000
      # If not shared network (Docker Desktop): CHATWOOT_BASE_URL=http://host.docker.internal:3000
      CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-http://chatwoot_rails:3000}
      CHATWOOT_PLATFORM_API_TOKEN: ${CHATWOOT_PLATFORM_API_TOKEN:-}
      # Browser-facing Chatwoot URL for login / inbox setup links (falls back to CHATWOOT_BASE_URL in code if unset).
      CHATWOOT_PUBLIC_URL: ${CHATWOOT_PUBLIC_URL:-https://chatwoot.useautobus.com}
      # Optional: public origin of this API for Meta → Autobus webhook hints (WhatsApp channel-link response).
      AUTOBUS_PUBLIC_API_URL: ${AUTOBUS_PUBLIC_API_URL:-https://api.useautobus.com}

      # Qdrant RAG stack: use `http://greenbrain_rag_api:8088` when backend joins `greenbrain_rag`
      # (see `networks` below). Otherwise use a host-reachable URL, e.g.
      # `http://host.docker.internal:8088` if the RAG API port is published.
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://greenbrain_rag_api:8088}
      RAG_SERVICE_API_KEY: ${RAG_SERVICE_API_KEY:-}
      # Conversational chat always uses RAG when RAG_SERVICE_URL is set (see nlu.py).
      RAG_TENANT_MODE: ${RAG_TENANT_MODE:-company_then_user}
      RAG_USE_INTERNAL_USER_TENANT: ${RAG_USE_INTERNAL_USER_TENANT:-true}

    ports:
      - "8000:8000"
    extra_hosts:
      # Ensure `host.docker.internal` resolves on Linux engines too.
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autobus_network
      # Shared platform network (Caddy, Postiz, Chatwoot, RAG API)
      - caddy
      # RAG internal network (Qdrant, TEI, rag-api)
      - greenbrain_rag

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  autobus_network:
    driver: bridge
  caddy:
    external: true
    name: caddy
  greenbrain_rag:
    external: true
    name: greenbrain_rag
